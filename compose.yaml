services:
  postgres:
    image: 'postgres:latest'
    container_name: "db"
    environment:
      - 'POSTGRES_DB=estoque'
      - 'POSTGRES_PASSWORD=root'
      - 'POSTGRES_USER=postgres'
    networks:
      - api_network
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  api_network:
      driver: bridge

